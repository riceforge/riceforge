name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build --release -p riceforge

      - name: Build index tool
        run: cargo build --release -p rf-index

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar czf "dist/riceforge-${TAG}-linux-x86_64.tar.gz" \
            -C target/release riceforge rf-index
          sha256sum "dist/riceforge-${TAG}-linux-x86_64.tar.gz" \
            > "dist/riceforge-${TAG}-linux-x86_64.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
