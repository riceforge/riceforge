name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev

      - name: Build CLI
        run: cargo build --release -p rf-cli

      - name: Build index tool
        run: cargo build --release -p rf-index

      - name: Build GUI
        run: cargo build --release -p rf-gui

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist

          tar czf "dist/riceforge-${TAG}-linux-x86_64.tar.gz" \
            -C target/release riceforge rf-index
          sha256sum "dist/riceforge-${TAG}-linux-x86_64.tar.gz" \
            > "dist/riceforge-${TAG}-linux-x86_64.tar.gz.sha256"

          mkdir -p dist/gui-pkg
          cp target/release/rf-gui dist/gui-pkg/
          cp rf-gui/assets/riceforge.desktop dist/gui-pkg/
          tar czf "dist/rf-gui-${TAG}-linux-x86_64.tar.gz" \
            -C dist/gui-pkg rf-gui riceforge.desktop
          sha256sum "dist/rf-gui-${TAG}-linux-x86_64.tar.gz" \
            > "dist/rf-gui-${TAG}-linux-x86_64.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
